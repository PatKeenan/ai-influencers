version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: influence-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: influence
      POSTGRES_PASSWORD: influence
      POSTGRES_DB: influence
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U influence"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
